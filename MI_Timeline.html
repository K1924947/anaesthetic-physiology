<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI Timeline · Anaesthetic Physiology</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #07090f;
    --surface: #0a0d17;
    --border:  #141c2e;
    --text:    #e2e8f0;
    --muted:   #4b5563;
    --dim:     #1f2d40;
    --accent:  #60a5fa;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 32px 16px 48px;
  }

  header { text-align: center; margin-bottom: 28px; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 4px; color: var(--dim);
    text-transform: uppercase; margin-bottom: 6px;
  }
  header h1 { font-size: clamp(22px, 5vw, 30px); font-weight: 400; letter-spacing: 1px; color: #f1f5f9; }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 6px; font-style: italic; }

  .wrap { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 16px; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  header { animation: fadeIn 0.6s ease both; }
  .timeline-bar { animation: fadeUp 0.5s ease 0.1s both; }
  .heart-wrap { animation: fadeUp 0.5s ease 0.2s both; }
  .cards-row { animation: fadeUp 0.5s ease 0.3s both; }
  .comp-bar-wrap { animation: fadeUp 0.5s ease 0.4s both; }

  /* ── Card content transition ── */
  .info-card-content {
    transition: opacity 0.25s ease;
  }
  .info-card-content.fading {
    opacity: 0;
  }

  /* ── Timeline bar ── */
  .timeline-bar {
    display: flex; gap: 6px;
    padding: 4px 0 8px;
    width: 100%;
  }
  .t-btn {
    flex: 1; padding: 8px 4px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--muted); cursor: pointer; transition: all 0.2s;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.3px; text-align: center; line-height: 1.4;
    min-width: 0;
  }
  .t-btn:hover { border-color: #2a3a5a; color: #94a3b8; transform: translateY(-1px); }
  .t-btn.active { color: #f1f5f9; }
  .t-btn:active { transform: translateY(0); }

  /* ── Heart visual ── */
  .heart-wrap {
    background: #070a12; border: 1px solid var(--border);
    border-radius: 16px; padding: 16px;
    display: flex; align-items: center; justify-content: center;
    min-height: 200px;
    transition: border-color 0.4s ease, box-shadow 0.4s ease;
    box-shadow: 0 0 40px rgba(96,165,250,0.03);
  }
  #heartSvg { display: block; width: 100%; height: auto; max-width: 560px; }
  #heartSvg path, #heartSvg ellipse, #heartSvg rect {
    transition: fill 0.5s ease, opacity 0.5s ease, d 0.5s ease;
  }

  /* ── Three info cards ── */
  .cards-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
  }
  @media (max-width: 600px) { .cards-row { grid-template-columns: 1fr; } }

  .info-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px;
    transition: border-color 0.4s ease, box-shadow 0.4s ease;
    min-height: 160px;
  }
  .info-card:hover {
    box-shadow: 0 0 24px rgba(96,165,250,0.05);
  }
  .info-card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .info-card-content { font-size: 13px; color: #94a3b8; line-height: 1.7; }
  .info-card-content li { margin-left: 14px; margin-bottom: 4px; }

  /* ── Complications bar ── */
  .comp-bar-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px;
  }
  .comp-bar-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: #64748b; margin-bottom: 14px;
  }
  .comp-gantt { display: flex; flex-direction: column; gap: 8px; }
  .comp-row { display: flex; align-items: center; gap: 10px; }
  .comp-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--muted); width: 160px; flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .comp-track {
    flex: 1; height: 8px; background: #0d1220;
    border-radius: 4px; position: relative; overflow: visible;
  }
  .comp-fill {
    position: absolute; top: 0; height: 100%;
    border-radius: 4px; transition: opacity 0.35s ease, box-shadow 0.35s ease;
  }
  .comp-fill.active-comp { box-shadow: 0 0 8px currentColor; }

  /* ── Footer ── */
  footer {
    margin-top: 40px; width: 100%; max-width: 900px;
    border-top: 1px solid #141c2e; padding-top: 20px; text-align: center;
  }
  .footer-inner { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; }
  .footer-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 3px; text-transform: uppercase; color: #60a5fa;
    background: #60a5fa14; border: 1px solid #60a5fa33;
    padding: 3px 8px; border-radius: 20px;
  }
  .footer-dot { color: #1f2d40; font-size: 12px; }
  .footer-title { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #94a3b8; }
  .footer-author { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #60a5fa99; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Cardiology Pathophysiology</div>
  <h1>Myocardial Infarction Timeline</h1>
  <p class="subtitle">Tap a time stage to explore gross, microscopic, and complication findings</p>
</header>

<div class="wrap">

  <!-- Timeline buttons -->
  <div class="timeline-bar" id="timelineBar"></div>

  <!-- Heart visual -->
  <div class="heart-wrap">
    <svg id="heartSvg" viewBox="0 0 560 200" width="560" height="200" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- Three info cards -->
  <div class="cards-row">
    <div class="info-card" id="grossCard">
      <div class="info-card-title" style="color:#60a5fa;">Gross Appearance</div>
      <div class="info-card-content" id="grossContent"></div>
    </div>
    <div class="info-card" id="microCard">
      <div class="info-card-title" style="color:#a78bfa;">Microscopic</div>
      <div class="info-card-content" id="microContent"></div>
    </div>
    <div class="info-card" id="compCard">
      <div class="info-card-title" style="color:#f87171;">Complications</div>
      <div class="info-card-content" id="compContent"></div>
    </div>
  </div>

  <!-- Complication Gantt bar -->
  <div class="comp-bar-wrap">
    <div class="comp-bar-title">Complication Timeline — All Stages</div>
    <div class="comp-gantt" id="compGantt"></div>
  </div>

</div>

<footer>
  <div class="footer-inner">
    <span class="footer-tag">Built for teaching</span>
    <span class="footer-dot">·</span>
    <span class="footer-title">Anaesthetic Physiology — MI Timeline</span>
    <span class="footer-dot">·</span>
    <span class="footer-author">Developed by Dr Ed Kim</span>
  </div>
</footer>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const STAGES = [
  {
    id: "s0",
    label: "0–4h",
    color: "#60a5fa",
    // Heart visual: infarct zone colour, opacity
    infarctColor: "#8b1a1a",
    infarctOpacity: 0.0, // nothing visible
    wallThinning: 0,
    gross: "Normal appearing myocardium. No visible changes — the infarct is invisible to the naked eye at this stage.",
    micro: [
      "Wavy fibres at the border of the infarct — passive mechanical stretching by adjacent contracting muscle",
      "Central zone: no changes visible on light microscopy",
      "Cell swelling (hydropic change) — Na⁺/K⁺ ATPase failing, sodium flooding in",
    ],
    complications: [
      "VF / Ventricular fibrillation — most common cause of early death",
      "K⁺ leaking from dying cells destabilises membrane potentials throughout the myocardium",
      "This is why immediate monitoring and defibrillator access is critical",
    ],
    compActive: ["arrhythmia"],
  },
  {
    id: "s1",
    label: "4–12h",
    color: "#60a5fa",
    infarctColor: "#c0c0b0",
    infarctOpacity: 0.3,
    wallThinning: 0,
    gross: "Normal to faint pallor in the infarct zone. Changes are subtle and may not be grossly apparent.",
    micro: [
      "Coagulative necrosis establishing — ghost cells appear, loss of nuclei, loss of striations",
      "Deeply eosinophilic (pink) cytoplasm — denatured proteins",
      "Neutrophils beginning to arrive at the margins",
      "Cell architecture preserved but lifeless — the hallmark of coagulative necrosis",
    ],
    complications: [
      "VF / Arrhythmia — still the dominant risk",
      "Cardiogenic shock may develop if the infarct is large (>40% LV mass) — acute loss of contractile tissue drops CO",
    ],
    compActive: ["arrhythmia", "cardiogenic"],
  },
  {
    id: "s2",
    label: "12–24h",
    color: "#94a3b8",
    infarctColor: "#b0b0a0",
    infarctOpacity: 0.6,
    wallThinning: 0,
    gross: "Pallor — loss of red-brown colour as myoglobin washes out of dead cells. First definitive gross change.",
    micro: [
      "Coagulative necrosis well established",
      "Peak early neutrophil infiltration — acute inflammatory response in full swing",
      "Ghost cells prominent — tissue architecture preserved but nuclei absent",
    ],
    complications: [
      "VF / Arrhythmia — still significant risk",
      "Cardiogenic shock in large infarcts",
    ],
    compActive: ["arrhythmia", "cardiogenic"],
  },
  {
    id: "s3",
    label: "1–3d",
    color: "#facc15",
    infarctColor: "#d4c89a",
    infarctOpacity: 0.8,
    wallThinning: 1,
    gross: "Pale centre with a hyperaemic (red/haemorrhagic) border — inflammatory response brings blood to the margins while the central zone remains pale.",
    micro: [
      "Dense neutrophil infiltration — peak neutrophilic phase",
      "Metalloproteinases released by neutrophils digest the extracellular matrix",
      "Wall is at maximum structural weakness — no scar yet, matrix being destroyed",
    ],
    complications: [
      "Free wall rupture → haemopericardium → cardiac tamponade — sudden cardiovascular collapse",
      "Fibrinous pericarditis → friction rub, pleuritic chest pain — inflammation reaching epicardium",
    ],
    compActive: ["rupture", "pericarditis"],
  },
  {
    id: "s4",
    label: "3–7d",
    color: "#f97316",
    infarctColor: "#c8a838",
    infarctOpacity: 0.9,
    wallThinning: 2,
    gross: "Yellow and soft centre — maximum softening from macrophage digestion. Red-yellow appearance.",
    micro: [
      "Neutrophils replaced by macrophages — chronic inflammatory phase",
      "Macrophages phagocytosing necrotic debris",
      "Early granulation tissue at the edges — fibroblasts and new capillaries beginning",
    ],
    complications: [
      "Ventricular septal rupture → new harsh pansystolic murmur, L→R shunt, ↑O₂ sat in RV",
      "Papillary muscle rupture → posteromedial most common (single RCA supply) → acute MR → pulmonary oedema",
      "Fibrinous pericarditis — friction rub peaks here",
    ],
    compActive: ["septal", "papillary", "pericarditis"],
  },
  {
    id: "s5",
    label: "7–14d",
    color: "#f87171",
    infarctColor: "#c44a3a",
    infarctOpacity: 0.7,
    wallThinning: 2,
    gross: "Red border emerging around yellow centre — granulation tissue is highly vascular giving the margins a red appearance.",
    micro: [
      "Granulation tissue replacing necrotic zone",
      "Fibroblasts laying down collagen",
      "New capillary formation (angiogenesis)",
      "Macrophages still clearing residual debris",
    ],
    complications: [
      "Ventricular pseudoaneurysm — free wall rupture contained by pericardium, forms false aneurysm with narrow neck",
      "Distinguished from true aneurysm by narrow neck and absence of all three wall layers",
    ],
    compActive: ["pseudoaneurysm"],
  },
  {
    id: "s6",
    label: "2wk–2mo",
    color: "#a78bfa",
    infarctColor: "#7a6a8a",
    infarctOpacity: 0.8,
    wallThinning: 2,
    gross: "Scar tissue forming — area shrinks, becomes firmer. Colour transitions from red-yellow toward pale grey.",
    micro: [
      "Granulation tissue maturing — collagen becoming denser",
      "Vascularity reducing as scar matures",
      "Fibrosis establishing — myocytes replaced by collagen permanently",
    ],
    complications: [
      "True ventricular aneurysm — contains all three wall layers, paradoxical outward bulge during systole. Persistent ST elevation on ECG.",
      "Mural thrombus forming inside aneurysm → systemic emboli → stroke",
    ],
    compActive: ["aneurysm"],
  },
  {
    id: "s7",
    label: "2mo+",
    color: "#e2e8f0",
    infarctColor: "#e0e0e0",
    infarctOpacity: 0.9,
    wallThinning: 3,
    gross: "Dense white scar — tough, fibrous, shrunken. Clearly demarcated from surrounding viable myocardium.",
    micro: [
      "Dense collagen fibrosis — type I collagen",
      "No myocytes — permanently replaced",
      "No vascularity — avascular scar",
      "Non-contractile, non-conducting",
    ],
    complications: [
      "Dressler syndrome — autoimmune fibrinous pericarditis weeks–months post MI. Antibodies against exposed cardiac antigens. Fever, chest pain, friction rub, ↑ESR. Treat with aspirin/NSAIDs",
      "Chronic heart failure — ventricular remodelling, lost contractile mass, progressive dilatation",
    ],
    compActive: ["dressler", "hf"],
  },
];

// Complication spans for Gantt — [startStageIndex, endStageIndex]
const COMPLICATIONS = [
  { id: "arrhythmia",    label: "Arrhythmia / VF",           color: "#60a5fa", start: 0, end: 2 },
  { id: "cardiogenic",   label: "Cardiogenic shock",          color: "#f97316", start: 1, end: 2 },
  { id: "rupture",       label: "Free wall rupture",          color: "#f87171", start: 3, end: 3 },
  { id: "pericarditis",  label: "Fibrinous pericarditis",     color: "#facc15", start: 3, end: 4 },
  { id: "septal",        label: "Septal rupture (VSD)",       color: "#fb923c", start: 4, end: 4 },
  { id: "papillary",     label: "Papillary muscle rupture",   color: "#f87171", start: 4, end: 4 },
  { id: "pseudoaneurysm",label: "Pseudoaneurysm",             color: "#818cf8", start: 5, end: 5 },
  { id: "aneurysm",      label: "True ventricular aneurysm",  color: "#a78bfa", start: 6, end: 7 },
  { id: "dressler",      label: "Dressler syndrome",          color: "#e879f9", start: 7, end: 7 },
  { id: "hf",            label: "Chronic heart failure",      color: "#94a3b8", start: 6, end: 7 },
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let activeStage = 0;

// ─── HEART SVG ───────────────────────────────────────────────────────────────
const NS = "http://www.w3.org/2000/svg";
function svgEl(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  if (parent) parent.appendChild(e);
  return e;
}
function svgTxt(attrs, text, parent) {
  const e = document.createElementNS(NS, "text");
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  e.textContent = text;
  if (parent) parent.appendChild(e);
  return e;
}

function renderHeart() {
  const svg = document.getElementById("heartSvg");
  // Smooth morph — fade out, redraw, fade in
  svg.style.transition = "opacity 0.2s ease";
  svg.style.opacity = "0.55";
  setTimeout(() => {
    svg.innerHTML = "";
    const stage = STAGES[activeStage];
    // rest of render happens synchronously below
    _doRenderHeart(svg, stage);
    svg.style.opacity = "1";
  }, 140);
}
function _doRenderHeart(svg, stage) {

  // Background
  svgEl("rect", { x:0, y:0, width:560, height:200, fill:"transparent" }, svg);

  // ── Cross section of LV wall ──
  // Outer wall (epicardium) - big ellipse
  // Inner cavity (endocardium) - smaller ellipse
  // Infarct zone shown as a wedge in the anterior wall

  const cx = 130, cy = 100;
  const outerRx = 85, outerRy = 78;
  const innerRx = 48, innerRy = 44;

  // Wall thinning based on stage
  const thin = stage.wallThinning;
  const thinOffset = thin * 5;

  // Outer wall
  svgEl("ellipse", { cx, cy, rx: outerRx, ry: outerRy, fill: "#1a0a0a", stroke: "#3a1a1a", "stroke-width": 1.5 }, svg);

  // Myocardium fill (healthy tissue)
  svgEl("ellipse", { cx, cy, rx: outerRx - 2, ry: outerRy - 2, fill: "#6b1a1a" }, svg);

  // Infarct wedge — anterior wall (top-left of ellipse)
  // Draw as a path clipped to the wall region
  const infarctOpacity = stage.infarctOpacity;
  const infarctColor = stage.infarctColor;

  // Infarct arc — covers roughly 60° of the anterior wall
  const startAngle = -150 * Math.PI / 180;
  const endAngle = -50 * Math.PI / 180;
  const steps = 20;

  // Outer arc points
  const outerPts = [];
  for (let i = 0; i <= steps; i++) {
    const a = startAngle + (endAngle - startAngle) * i / steps;
    outerPts.push([cx + (outerRx - 1) * Math.cos(a), cy + (outerRy - 1) * Math.sin(a)]);
  }
  // Inner arc points (reversed, with thinning)
  const innerPts = [];
  const innerRxT = innerRx - thinOffset * 0.3;
  const innerRyT = innerRy - thinOffset * 0.3;
  for (let i = steps; i >= 0; i--) {
    const a = startAngle + (endAngle - startAngle) * i / steps;
    innerPts.push([cx + (innerRxT + thinOffset) * Math.cos(a), cy + (innerRyT + thinOffset) * Math.sin(a)]);
  }

  const allPts = [...outerPts, ...innerPts];
  const pathD = allPts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ') + ' Z';

  svgEl("path", { d: pathD, fill: infarctColor, opacity: infarctOpacity, transition: "all 0.4s" }, svg);

  // Infarct border glow when active
  if (infarctOpacity > 0.1) {
    svgEl("path", { d: pathD, fill: "none", stroke: stage.color, "stroke-width": 1.5, opacity: 0.4 }, svg);
  }

  // LV cavity
  svgEl("ellipse", { cx, cy, rx: innerRxT, ry: innerRyT, fill: "#0a0510" }, svg);

  // Wall labels
  svgTxt({ x: cx, y: cy + 3, fill: "#94a3b8", "font-size": 11, "text-anchor": "middle", "font-family": "JetBrains Mono, monospace" }, "LV cavity", svg);

  // Infarct label if visible
  if (infarctOpacity > 0.15) {
    const labelX = cx + (outerRx + 12) * Math.cos(-100 * Math.PI / 180);
    const labelY = cy + (outerRy + 12) * Math.sin(-100 * Math.PI / 180);
    svgTxt({ x: labelX - 10, y: labelY, fill: stage.color, "font-size": 8, "font-family": "JetBrains Mono, monospace", opacity: 0.8 }, "infarct zone", svg);
    // Arrow line
    svgEl("line", {
      x1: labelX + 28, y1: labelY - 3,
      x2: cx + outerRx * 0.7 * Math.cos(-100 * Math.PI / 180),
      y2: cy + outerRy * 0.7 * Math.sin(-100 * Math.PI / 180),
      stroke: stage.color, "stroke-width": 0.8, opacity: 0.5
    }, svg);
  }

  // Wavefront label — left side at infarct level with pointer
  {
    // Infarct midpoint angle is ~-100deg; label sits to the left at same y
    const wfLabelX = 4;
    const wfLabelY = 28; // top-left, roughly same height as infarct zone
    const pointerEndX = 58; // tip of line pointing toward infarct
    const pointerEndY = 34;
    if (activeStage >= 1 && activeStage <= 3) {
      svgTxt({ x: wfLabelX, y: wfLabelY, fill: "#facc15", "font-size": 9, "font-family": "JetBrains Mono, monospace", opacity: 0.9 }, "wavefront", svg);
      svgTxt({ x: wfLabelX, y: wfLabelY + 13, fill: "#facc15bb", "font-size": 8, "font-family": "JetBrains Mono, monospace" }, "endo→epi", svg);
      // Arrow from label rightward into the WALL (between endo and epi) — midwall at angle ~-120deg
      // midwall x ~ 130 + 66*cos(-120deg) = 130 - 33 = 97, y ~ 100 + 60*sin(-120deg) = 100 - 52 = 48
      svgEl("line", { x1: wfLabelX + 54, y1: wfLabelY - 2, x2: 100, y2: 60, stroke: "#facc15", "stroke-width": 0.8, opacity: 0.5, "stroke-dasharray": "2,2" }, svg);
      svgEl("circle", { cx: 100, cy: 60, r: 2.5, fill: "#facc15", opacity: 0.6 }, svg);
      // Small arrow showing direction endo to epi
      
    } else if (activeStage >= 4) {
      svgTxt({ x: wfLabelX, y: wfLabelY, fill: "#64748b", "font-size": 9, "font-family": "JetBrains Mono, monospace", opacity: 1 }, "wavefront", svg);
      svgTxt({ x: wfLabelX, y: wfLabelY + 13, fill: "#4b5563", "font-size": 8, "font-family": "JetBrains Mono, monospace" }, "complete", svg);
    }
  }

  // ── Right side: legend / stage info ──
  const lx = 300;

  svgTxt({ x: lx, y: 30, fill: "#4b5563", "font-size": 9, "font-family": "JetBrains Mono, monospace", "letter-spacing": 2 }, "STAGE", svg);
  svgTxt({ x: lx, y: 52, fill: stage.color, "font-size": 18, "font-family": "JetBrains Mono, monospace", "font-weight": 500 }, stage.label, svg);

  // Appearance indicator
  svgTxt({ x: lx, y: 80, fill: "#4b5563", "font-size": 8, "font-family": "JetBrains Mono, monospace", "letter-spacing": 1 }, "GROSS", svg);

  // Colour swatch
  svgEl("rect", { x: lx, y: 88, width: 170, height: 14, rx: 4, fill: infarctOpacity < 0.1 ? "#1a1a2a" : infarctColor, opacity: Math.max(infarctOpacity, 0.15) }, svg);
  const swatchLabel = infarctOpacity < 0.1 ? "normal" :
    activeStage === 1 ? "faint pallor" :
    activeStage === 2 ? "pallor" :
    activeStage === 3 ? "pale + hyperaemic border" :
    activeStage === 4 ? "yellow-soft" :
    activeStage === 5 ? "red border" :
    activeStage === 6 ? "scar forming" : "white scar";
  const swatchTextColor = infarctOpacity < 0.1 ? "#ffffff" : activeStage === 7 ? "#1a1a2a" : "#f1f5f9";
  svgTxt({ x: lx + 4, y: 99, fill: swatchTextColor, "font-size": 8, "font-family": "JetBrains Mono, monospace" }, swatchLabel, svg);

  // Wall integrity bar
  svgTxt({ x: lx, y: 122, fill: "#4b5563", "font-size": 8, "font-family": "JetBrains Mono, monospace", "letter-spacing": 1 }, "WALL INTEGRITY", svg);
  svgEl("rect", { x: lx, y: 128, width: 170, height: 6, rx: 3, fill: "#0d1220" }, svg);
  const integrityW = Math.max(10, 170 - thin * 42);
  const integrityColor = thin === 0 ? "#4ade80" : thin === 1 ? "#facc15" : thin === 2 ? "#f97316" : "#94a3b8";
  svgEl("rect", { x: lx, y: 128, width: integrityW, height: 6, rx: 3, fill: integrityColor }, svg);

  const integrityLabel = thin === 0 ? "intact" : thin === 1 ? "weakening" : thin === 2 ? "weakest — rupture risk" : "scarred";
  svgTxt({ x: lx, y: 146, fill: integrityColor, "font-size": 8, "font-family": "JetBrains Mono, monospace" }, integrityLabel, svg);

  // Neutrophil / macrophage / fibroblast activity bars
  const cells = [
    { label: "Neutrophils", vals: [0.1, 0.3, 0.9, 1.0, 0.4, 0.1, 0, 0], color: "#60a5fa" },
    { label: "Macrophages", vals: [0, 0, 0.1, 0.4, 1.0, 0.8, 0.3, 0.1], color: "#f97316" },
    { label: "Fibroblasts", vals: [0, 0, 0, 0, 0.2, 0.6, 1.0, 0.8], color: "#4ade80" },
  ];
  cells.forEach((cell, i) => {
    const by = 162 + i * 14;
    svgTxt({ x: lx, y: by + 8, fill: "#4b5563", "font-size": 7, "font-family": "JetBrains Mono, monospace" }, cell.label, svg);
    svgEl("rect", { x: lx + 82, y: by, width: 80, height: 8, rx: 3, fill: "#0d1220" }, svg);
    svgEl("rect", { x: lx + 82, y: by, width: 80 * cell.vals[activeStage], height: 8, rx: 3, fill: cell.color, opacity: 0.8 }, svg);
  });
} // end _doRenderHeart

// ─── RENDER FUNCTIONS ────────────────────────────────────────────────────────

function renderTimeline() {
  const bar = document.getElementById("timelineBar");
  bar.innerHTML = "";
  STAGES.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "t-btn" + (i === activeStage ? " active" : "");
    btn.textContent = s.label;
    if (i === activeStage) {
      btn.style.borderColor = s.color;
      btn.style.background = s.color + "22";
      btn.style.color = s.color;
    }
    btn.addEventListener("click", () => { activeStage = i; renderAll(); });
    bar.appendChild(btn);
  });
}

function renderCards() {
  const stage = STAGES[activeStage];

  // Gross
  document.getElementById("grossCard").style.borderColor = "#60a5fa44";
  document.getElementById("grossContent").textContent = stage.gross;

  // Micro
  document.getElementById("microCard").style.borderColor = "#a78bfa44";
  const microEl = document.getElementById("microContent");
  microEl.innerHTML = "<ul>" + stage.micro.map(m => `<li>${m}</li>`).join("") + "</ul>";

  // Complications
  document.getElementById("compCard").style.borderColor = "#f8717144";
  const compEl = document.getElementById("compContent");
  compEl.innerHTML = stage.complications.map(c => `<p style="margin-bottom:8px;">${c}</p>`).join("");
}

function renderGantt() {
  const gantt = document.getElementById("compGantt");
  gantt.innerHTML = "";
  const n = STAGES.length;
  // Use segment-based positioning: each stage occupies 1/(n-1) of the track
  // But represent as n equal segments so single-stage events have proper width
  const segW = 100 / n;

  COMPLICATIONS.forEach(comp => {
    const row = document.createElement("div");
    row.className = "comp-row";

    const label = document.createElement("div");
    label.className = "comp-label";
    label.textContent = comp.label;

    const track = document.createElement("div");
    track.className = "comp-track";

    const fill = document.createElement("div");
    fill.className = "comp-fill";
    const leftPct = comp.start * segW;
    const widthPct = (comp.end - comp.start + 1) * segW;
    fill.style.left = leftPct + "%";
    fill.style.width = widthPct + "%";
    fill.style.background = comp.color;

    const isActive = STAGES[activeStage].compActive.includes(comp.id);
    fill.style.opacity = isActive ? "1" : "0.18";
    if (isActive) {
      fill.classList.add("active-comp");
      fill.style.color = comp.color;
      label.style.color = comp.color;
    }

    // Current stage marker
    const markerLeft = (activeStage + 0.5) * segW;
    const marker = document.createElement("div");
    marker.style.cssText = `position:absolute;top:-3px;left:${markerLeft}%;width:2px;height:14px;background:#60a5fa;border-radius:1px;opacity:0.7;transform:translateX(-50%);`;
    track.appendChild(marker);

    track.appendChild(fill);
    row.appendChild(label);
    row.appendChild(track);
    gantt.appendChild(row);
  });

  // Time axis labels row at the bottom
  const axisRow = document.createElement("div");
  axisRow.className = "comp-row";
  axisRow.style.marginTop = "6px";

  const axisLabelSpacer = document.createElement("div");
  axisLabelSpacer.className = "comp-label";

  const axisTrack = document.createElement("div");
  axisTrack.style.cssText = "flex:1;position:relative;height:16px;";

  // Time point labels at segment boundaries
  const timePts = ['0', '4h', '12h', '24h', '3d', '7d', '14d', '2mo', ''];
  timePts.forEach((lbl, i) => {
    if (!lbl) return;
    const tick = document.createElement('div');
    const leftPct = i * segW;
    const color = (i === activeStage) ? STAGES[activeStage].color : '#2d3f55';
    tick.style.cssText = 'position:absolute;left:' + leftPct + '%;transform:translateX(-50%);font-family:JetBrains Mono,monospace;font-size:8px;color:' + color + ';white-space:nowrap;top:2px;';
    tick.textContent = lbl;
    axisTrack.appendChild(tick);
  });

  axisRow.appendChild(axisLabelSpacer);
  axisRow.appendChild(axisTrack);
  gantt.appendChild(axisRow);
}

function renderAll() {
  renderTimeline();
  renderHeart();
  renderCards();
  renderGantt();
  // Smooth fade-in like page load — add class, remove after paint
  ['grossCard','microCard','compCard'].forEach((id, i) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.animation = 'none';
    el.offsetHeight; // force reflow
    el.style.animation = 'fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) ' + (i * 0.07) + 's both';
  });
}

renderAll();
</script>
